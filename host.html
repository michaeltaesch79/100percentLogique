<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100% Logique — HOST</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#FFD700; --gold-d:#B8860B; --blue:#020B2D; --blue-m:#061456;
  --blue-b:#0A2080; --glow:#1A4FD8; --cyan:#00D4FF;
  --ok:#00E676; --err:#FF1744; --white:#FFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--blue);color:var(--white);min-height:100vh;overflow:hidden;}
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 15% 50%,#0A2080 0%,transparent 55%),
             radial-gradient(ellipse at 85% 20%,#1A0050 0%,transparent 50%),var(--blue);overflow:hidden;}
.bg::before{content:'';position:absolute;inset:-50%;
  background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(26,79,216,.04) 40px,rgba(26,79,216,.04) 41px);
  animation:bgm 20s linear infinite;}
@keyframes bgm{to{transform:translate(60px,60px);}}
.wrap{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column;padding:14px;gap:10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,3.5vw,44px);letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),#FFF8A0,var(--gold-d));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(255,215,0,.3));}

/* ── TAP OVERLAY ── */
#tapOverlay{position:fixed;inset:0;z-index:999;background:rgba(2,11,45,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;}

/* ── LOBBY ── */
#lobbyScreen{display:flex;flex-direction:column;align-items:center;gap:16px;flex:1;justify-content:center;}
.lobby-top{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;}
.qr-wrap{background:rgba(255,255,255,.05);border:2px solid rgba(255,215,0,.3);
  border-radius:20px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.qr-label{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;}
.join-url{font-size:12px;color:rgba(255,255,255,.4);font-family:monospace;}
.lobby-right{display:flex;flex-direction:column;gap:12px;align-items:center;}
.player-count{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--gold);line-height:1;}
.player-count-label{font-size:13px;color:rgba(255,255,255,.5);margin-top:-8px;}
#playersLobby{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:500px;}
.p-chip{background:rgba(255,255,255,.08);border-radius:20px;padding:6px 14px;
  display:flex;align-items:center;gap:8px;animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.p-chip-av{width:28px;height:28px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.p-chip-av img{width:100%;height:100%;object-fit:cover;}
.p-chip-name{font-size:14px;font-weight:800;}
.p-chip-age{font-size:10px;color:rgba(255,255,255,.4);}
.waiting-txt{color:rgba(255,255,255,.3);font-style:italic;}

/* ── LENGTH SELECTOR in lobby ── */
.length-select{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.len-opt{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  border-radius:12px;padding:8px 20px;cursor:pointer;font-weight:800;font-size:14px;
  color:var(--white);transition:all .2s;}
.len-opt:hover{border-color:rgba(255,215,0,.5);}
.len-opt.active{border-color:var(--gold);background:rgba(255,215,0,.15);color:var(--gold);}
.len-opt .len-time{font-size:11px;color:rgba(255,255,255,.5);font-weight:400;display:block;}

.btn{border:none;border-radius:14px;padding:12px 28px;font-size:16px;font-weight:900;
  cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#000;}
.btn-gold:hover:not(:disabled){transform:scale(1.03);filter:brightness(1.1);}
.btn-gold:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-out{background:transparent;border:2px solid rgba(255,255,255,.3);color:var(--white);padding:10px 20px;font-size:14px;}
.btn-sm{padding:8px 16px;font-size:13px;}

/* ── GAME WRAP ── */
#gameWrap{display:none;flex-direction:column;gap:8px;flex:1;}
.top-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.q-counter{display:flex;flex-direction:column;}
.q-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,2.5vw,32px);color:var(--gold);}
.q-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:-4px;}
.scores-strip{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0;}
.s-card{background:rgba(255,255,255,.08);border-radius:10px;padding:6px 10px;
  display:flex;align-items:center;gap:6px;min-width:100px;}
.s-av{width:24px;height:24px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.s-av img{width:100%;height:100%;object-fit:cover;}
.s-name{font-size:11px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-pts{font-family:'Bebas Neue',sans-serif;font-size:18px;}
.s-card.answered{border:1px solid rgba(0,230,118,.4);}
.timer-wrap{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.timer-bar{height:100%;background:linear-gradient(90deg,var(--gold),#FF6B6B);border-radius:3px;width:100%;}
.question-box{background:rgba(255,255,255,.04);border-radius:16px;padding:16px 20px;flex:1;
  display:flex;flex-direction:column;gap:10px;}
.q-text{font-size:clamp(18px,2.8vw,30px);font-weight:800;line-height:1.3;}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ans-btn{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);
  border-radius:12px;padding:12px 14px;font-size:clamp(13px,1.8vw,17px);font-weight:800;
  text-align:left;color:var(--white);display:flex;align-items:center;gap:10px;}
.ans-letter{font-size:11px;background:rgba(255,255,255,.15);border-radius:6px;
  padding:2px 6px;flex-shrink:0;}
.ans-btn.correct{background:rgba(0,230,118,.2);border-color:var(--ok);}
.ans-btn.wrong{opacity:.4;}
.ans-count{font-size:13px;color:rgba(255,255,255,.6);}
.bottom-bar{display:flex;align-items:center;gap:12px;justify-content:space-between;}

/* ── REVEAL OVERLAY ── */
#revealOverlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(2,11,45,.95);
  flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;overflow-y:auto;}
#revealOverlay.show{display:flex;}
.reveal-correct-label{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--ok);text-transform:uppercase;}
.reveal-ans{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,52px);color:var(--ok);text-align:center;}
.reveal-cards{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:700px;}
.reveal-card{background:rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;
  display:flex;align-items:center;gap:8px;min-width:130px;}
.rc-av{width:32px;height:32px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rc-av img{width:100%;height:100%;object-fit:cover;}
.rc-name{font-size:13px;font-weight:800;flex:1;}
.rc-result{font-size:18px;}
.fact-box{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);
  border-radius:16px;padding:16px 20px;max-width:700px;width:100%;}
.fact-header{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.fact-text{font-size:clamp(13px,1.8vw,16px);color:rgba(255,255,255,.8);line-height:1.5;}

/* ── MID-GAME PODIUM OVERLAY ── */
#podiumOverlay{display:none;position:fixed;inset:0;z-index:60;background:rgba(2,11,45,.97);
  flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;}
#podiumOverlay.show{display:flex;}
.podium-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,56px);
  color:var(--gold);letter-spacing:4px;}
.podium-subtitle{font-size:14px;color:rgba(255,255,255,.5);}
.podium-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:600px;}
.pod-row{background:rgba(255,255,255,.07);border-radius:14px;padding:12px 18px;
  display:flex;align-items:center;gap:12px;}
.pod-rank{font-family:'Bebas Neue',sans-serif;font-size:28px;width:40px;text-align:center;}
.pod-av{width:44px;height:44px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.pod-av img{width:100%;height:100%;object-fit:cover;}
.pod-info{flex:1;}
.pod-name{font-size:18px;font-weight:800;}
.pod-age{font-size:11px;color:rgba(255,255,255,.4);}
.pod-score{font-family:'Bebas Neue',sans-serif;font-size:34px;}
.pod-bar-wrap{width:100%;max-width:600px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;}
.pod-bar{height:100%;border-radius:4px;transition:width 1s ease;}

/* ── FINAL SCREEN ── */
#finalScreen{display:none;position:fixed;inset:0;z-index:50;background:rgba(2,11,45,.97);
  flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
#finalScreen.show{display:flex;}
.final-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,64px);
  color:var(--gold);letter-spacing:4px;}
.podium{display:flex;gap:16px;align-items:flex-end;justify-content:center;}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.pod-avatar{width:60px;height:60px;border-radius:50%;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:32px;border:3px solid;}
.pod-avatar img{width:100%;height:100%;object-fit:cover;}
.pod-medal{font-size:28px;}
.pod-pname{font-size:13px;font-weight:800;text-align:center;}
.pod-pscore{font-family:'Bebas Neue',sans-serif;font-size:24px;}
.pod-base{border-radius:8px 8px 0 0;width:90px;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:32px;color:rgba(0,0,0,.5);}
.confetti-piece{position:fixed;width:10px;height:14px;border-radius:2px;
  animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="bg"></div>

<audio id="bgMusic" src="/music" loop preload="auto" style="display:none"></audio>

<div id="tapOverlay" onclick="startAudio()">
  <div style="font-size:72px">🎮</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;
    background:linear-gradient(135deg,#FFD700,#FFF8A0);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,215,0,.5))">
    100% LOGIQUE
  </div>
  <div style="font-size:18px;color:rgba(255,255,255,.6);font-weight:800">👆 Tap to start</div>
</div>

<div class="wrap">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">100% Logique</div>
  </div>

  <!-- ══ LOBBY ══ -->
  <div id="lobbyScreen">
    <div class="lobby-top">
      <div class="qr-wrap">
        <div class="qr-label">📱 Scan to Join</div>
        <canvas id="qrCanvas" width="220" height="220"></canvas>
        <div class="join-url" id="joinUrl"></div>
      </div>
      <div class="lobby-right">
        <div>
          <div class="player-count" id="playerCount">0</div>
          <div class="player-count-label">players joined</div>
        </div>
        <div id="playersLobby"><div class="waiting-txt">Waiting for players…</div></div>
      </div>
    </div>

    <div class="length-select">
      <span style="font-size:13px;color:rgba(255,255,255,.5);font-weight:700;">Game length:</span>
      <button class="len-opt active" data-len="20" onclick="selectLen(this)">20 Qs <span class="len-time">~15 min</span></button>
      <button class="len-opt" data-len="40" onclick="selectLen(this)">40 Qs <span class="len-time">~30 min</span></button>
      <button class="len-opt" data-len="60" onclick="selectLen(this)">60 Qs <span class="len-time">~45 min</span></button>
    </div>

    <button class="btn btn-gold" id="startBtn" onclick="hostStart()" disabled style="font-size:20px;padding:14px 48px;">
      🎯 Start Game
    </button>
  </div>

  <!-- ══ GAME WRAP ══ -->
  <div id="gameWrap">
    <div class="top-bar">
      <div class="q-counter">
        <div class="q-num" id="qNum">1 / 20</div>
        <div class="q-sub">QUESTION</div>
      </div>
      <div class="scores-strip" id="scoresStrip"></div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <div class="question-box">
      <div class="q-text" id="qText">Loading…</div>
      <div class="answers-grid" id="answersGrid"></div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-out btn-sm" onclick="hostReveal()">Reveal ⏩</button>
      <div class="ans-count" id="ansCount"></div>
      <button class="btn btn-gold" id="nextBtn" onclick="hostNext()" style="display:none">Next →</button>
    </div>
  </div>
</div>

<!-- ══ REVEAL OVERLAY ══ -->
<div id="revealOverlay">
  <div class="reveal-correct-label">✅ Correct Answer</div>
  <div class="reveal-ans" id="revealAns"></div>
  <div class="reveal-cards" id="revealCards"></div>
  <div class="fact-box" id="factBox">
    <div class="fact-header">💡 DID YOU KNOW?</div>
    <div class="fact-text" id="factText"></div>
  </div>
  <button class="btn btn-gold" onclick="hostNext()" id="revNextBtn">Next Question →</button>
</div>

<!-- ══ MID-GAME PODIUM OVERLAY ══ -->
<div id="podiumOverlay">
  <div class="podium-title">🏅 Standings</div>
  <div class="podium-subtitle" id="podiumSubtitle">After 5 questions</div>
  <div class="podium-list" id="podiumList"></div>
  <button class="btn btn-gold" onclick="hostNext()" style="margin-top:8px;font-size:18px;padding:14px 40px;">
    Continue ▶
  </button>
</div>

<!-- ══ FINAL SCREEN ══ -->
<div id="finalScreen">
  <div class="final-title">🏆 Final Results</div>
  <div class="podium" id="podium"></div>
  <div style="display:flex;gap:12px;margin-top:10px;">
    <button class="btn btn-gold" onclick="hostReset()">🔄 Play Again</button>
  </div>
</div>

<script>
/* ── QR CODE served by server ── */
function drawQR(canvas, text) {
  const img = new Image();
  const ctx = canvas.getContext('2d');
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); };
  img.onerror = () => {
    ctx.fillStyle='#FFF'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#000'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
    ctx.fillText(text.replace('https://',''), canvas.width/2, canvas.height/2);
  };
  img.src = `/qr.png?d=${encodeURIComponent(text)}`;
}

/* ── AUDIO ── */
const music = document.getElementById('bgMusic');
music.volume = 0.45;
function startAudio() { document.getElementById('tapOverlay').style.display='none'; }
function musicFadeIn(ms) {
  music.volume=0; music.play().catch(()=>{});
  const t=0.45, s=t/(ms/50);
  const iv=setInterval(()=>{ music.volume=Math.min(t,music.volume+s); if(music.volume>=t)clearInterval(iv); },50);
}
function musicFadeOut(ms) {
  const s=music.volume/(ms/50);
  const iv=setInterval(()=>{ music.volume=Math.max(0,music.volume-s); if(music.volume<=0){music.pause();clearInterval(iv);} },50);
}
function musicStop() { music.pause(); music.currentTime=0; music.volume=0.45; }

/* ── WEBSOCKET ── */
const wsProto = location.protocol==='https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${wsProto}://${location.host}`);
ws.onopen = () => ws.send(JSON.stringify({type:'host-connect'}));
ws.onerror = e => console.error('WS error',e);

let players=[], curQ=null, selectedLength=20;

function send(obj){ ws.send(JSON.stringify(obj)); }
function hostStart(){ send({type:'host-start', gameLength:selectedLength}); }
function hostReveal(){ send({type:'host-reveal'}); }
function hostNext(){
  document.getElementById('revealOverlay').classList.remove('show');
  document.getElementById('podiumOverlay').classList.remove('show');
  document.getElementById('nextBtn').style.display='none';
  send({type:'host-next'});
}
function hostReset(){ musicStop(); send({type:'host-reset'}); }

function selectLen(btn){
  document.querySelectorAll('.len-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedLength = parseInt(btn.dataset.len);
}

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  switch(msg.type){
    case 'host-ack':  players=msg.players||[]; renderLobby(); break;
    case 'lobby':     players=msg.players||[]; renderLobby(); break;
    case 'question':  showQuestion(msg); break;
    case 'answer-in': players=msg.scores; renderScores(msg.answeredCount,msg.totalPlayers); break;
    case 'reveal':    showReveal(msg); break;
    case 'finished':  showFinal(msg.scores); break;
    case 'reset-ack':
      document.getElementById('finalScreen').classList.remove('show');
      document.getElementById('revealOverlay').classList.remove('show');
      document.getElementById('podiumOverlay').classList.remove('show');
      document.getElementById('gameWrap').style.display='none';
      document.getElementById('lobbyScreen').style.display='flex';
      players=[]; renderLobby(); break;
  }
};

/* ── AVATAR HELPER ── */
const FALLBACK=['🦊','🐺','🐸','🦁','🐯','🐻'];
function avatarEl(av, size=28){
  const wrap=document.createElement('div');
  wrap.style.cssText=`width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:${size*0.6}px;flex-shrink:0;`;
  const img=new Image();
  const idx=parseInt((av||'character1').replace(/\D/g,''))-1;
  img.onload=()=>{ img.style.cssText='width:100%;height:100%;object-fit:cover;'; wrap.innerHTML=''; wrap.appendChild(img); };
  img.onerror=()=>{ wrap.textContent=FALLBACK[idx>=0?idx:0]; };
  img.src=`/avatars/${av||'character1.png'}`;
  wrap.appendChild(img);
  return wrap;
}

/* ── LOBBY ── */
function renderLobby(){
  const playerUrl = `${location.protocol}//${location.host}/player`;
  document.getElementById('joinUrl').textContent = playerUrl;
  drawQR(document.getElementById('qrCanvas'), playerUrl);
  document.getElementById('playerCount').textContent = players.length;
  const lb=document.getElementById('playersLobby');
  const sb=document.getElementById('startBtn');
  if(players.length===0){
    lb.innerHTML='<div class="waiting-txt">Waiting for players…</div>';
    sb.disabled=true; return;
  }
  lb.innerHTML='';
  players.forEach(p=>{
    const chip=document.createElement('div');
    chip.className='p-chip';
    chip.style.borderLeft=`3px solid ${p.color}`;
    const av=avatarEl(p.avatar,28);
    const info=document.createElement('div');
    info.innerHTML=`<div class="p-chip-name">${p.name}</div><div class="p-chip-age">${p.ageGroup||'adult'}</div>`;
    chip.appendChild(av); chip.appendChild(info);
    lb.appendChild(chip);
  });
  sb.disabled=false;
}

/* ── SCORES STRIP ── */
function renderScores(answered, total){
  const strip=document.getElementById('scoresStrip');
  strip.innerHTML='';
  const ans=document.querySelectorAll('.ans-btn');
  players.forEach(p=>{
    const card=document.createElement('div');
    card.className='s-card'+(answered>0?' answered':'');
    card.style.borderLeft=`3px solid ${p.color}`;
    const av=avatarEl(p.avatar,24);
    const info=document.createElement('div'); info.style.cssText='flex:1;min-width:0;';
    info.innerHTML=`<div class="s-name">${p.name}</div>`;
    const pts=document.createElement('div'); pts.className='s-pts'; pts.style.color=p.color;
    pts.textContent=p.score;
    card.appendChild(av); card.appendChild(info); card.appendChild(pts);
    strip.appendChild(card);
  });
  document.getElementById('ansCount').textContent=`${answered}/${total} answered`;
}

/* ── QUESTION ── */
function showQuestion(msg){
  musicFadeIn(800);
  document.getElementById('lobbyScreen').style.display='none';
  document.getElementById('gameWrap').style.display='flex';
  document.getElementById('revealOverlay').classList.remove('show');
  document.getElementById('podiumOverlay').classList.remove('show');
  document.getElementById('nextBtn').style.display='none';
  curQ=msg;
  document.getElementById('qNum').textContent=`${msg.index+1} / ${msg.total}`;
  document.getElementById('qText').textContent=msg.q;
  document.getElementById('ansCount').textContent=`0/${players.length} answered`;
  const letters=['A','B','C','D'];
  const grid=document.getElementById('answersGrid');
  grid.innerHTML='';
  msg.answers.forEach((ans,i)=>{
    const btn=document.createElement('button');
    btn.className='ans-btn'; btn.id=`ans-${i}`;
    btn.innerHTML=`<span class="ans-letter">${letters[i]}</span><span>${ans}</span>`;
    grid.appendChild(btn);
  });
  renderScores(0,players.length);
  const bar=document.getElementById('timerBar');
  bar.style.transition='none'; bar.style.width='100%';
  setTimeout(()=>{ bar.style.transition=`width ${msg.timeLimit}s linear`; bar.style.width='0%'; },100);
}

/* ── REVEAL ── */
function showReveal(msg){
  musicFadeOut(600);
  // Highlight correct/wrong answers
  msg.answers && Object.entries(msg.answers).forEach(([,ai])=>{
    const btn=document.getElementById(`ans-${ai}`);
    if(btn){ btn.classList.add(ai===msg.correctIndex?'correct':'wrong'); }
  });
  const correct=document.getElementById(`ans-${msg.correctIndex}`);
  if(correct) correct.classList.add('correct');

  document.getElementById('revealAns').textContent=msg.correctText;
  document.getElementById('factText').textContent=msg.fact;

  const cards=document.getElementById('revealCards');
  cards.innerHTML='';
  players.forEach(p=>{
    const ai=msg.answers?.[p.id];
    const isCorrect = ai===msg.correctIndex;
    const card=document.createElement('div');
    card.className='reveal-card';
    card.style.borderLeft=`3px solid ${isCorrect?'var(--ok)':'var(--err)'}`;
    const av=avatarEl(p.avatar,32);
    const name=document.createElement('div'); name.className='rc-name'; name.textContent=p.name;
    const res=document.createElement('div'); res.className='rc-result';
    res.textContent = ai===undefined ? '⏱️' : isCorrect ? '✅' : '❌';
    card.appendChild(av); card.appendChild(name); card.appendChild(res);
    cards.appendChild(card);
  });

  document.getElementById('revealOverlay').classList.add('show');

  // If this is a 5-question milestone AND not last question, show podium after Next
  if(msg.showPodium){
    document.getElementById('revNextBtn').textContent='See Standings 🏅';
    document.getElementById('revNextBtn').onclick = () => {
      document.getElementById('revealOverlay').classList.remove('show');
      showMidPodium(msg.scores, msg.qNum);
    };
  } else {
    document.getElementById('revNextBtn').textContent='Next Question →';
    document.getElementById('revNextBtn').onclick = hostNext;
  }
  document.getElementById('nextBtn').style.display='block';
}

/* ── MID-GAME PODIUM ── */
function showMidPodium(scores, qNum){
  musicFadeOut(400);
  const sorted=[...scores].sort((a,b)=>b.score-a.score);
  document.getElementById('podiumSubtitle').textContent=`After ${qNum} questions`;
  const list=document.getElementById('podiumList');
  list.innerHTML='';
  const medals=['🥇','🥈','🥉'];
  const maxScore=sorted[0]?.score||1;
  sorted.forEach((p,i)=>{
    const row=document.createElement('div'); row.className='pod-row';
    row.style.borderLeft=`4px solid ${p.color}`;
    const rank=document.createElement('div'); rank.className='pod-rank';
    rank.style.color=p.color; rank.textContent=medals[i]||`${i+1}`;
    const av=avatarEl(p.avatar,44);
    av.className='pod-av';
    const info=document.createElement('div'); info.className='pod-info';
    const ageLabel={teen:'🧒 Teen',young:'🧑 Young Adult',adult:'🧓 Adult'};
    info.innerHTML=`<div class="pod-name">${p.name}</div><div class="pod-age">${ageLabel[p.ageGroup]||'Adult'}</div>`;
    const sc=document.createElement('div'); sc.className='pod-score'; sc.style.color=p.color;
    sc.textContent=p.score;
    row.appendChild(rank); row.appendChild(av); row.appendChild(info); row.appendChild(sc);
    list.appendChild(row);
  });
  document.getElementById('podiumOverlay').classList.add('show');
}

/* ── FINAL ── */
function showFinal(scores){
  musicStop();
  const sorted=[...scores].sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const colors=['#FFD700','#C0C0C0','#CD7F32'];
  const heights=[120,90,70];
  const order=sorted.length>=3?[sorted[1],sorted[0],sorted[2]]:[sorted[0]];
  const podIdx=sorted.length>=3?[1,0,2]:[0];
  const pod=document.getElementById('podium');
  pod.innerHTML='';
  order.forEach((p,vi)=>{
    const ri=podIdx[vi];
    const col=document.createElement('div'); col.className='pod-col';
    const medal=document.createElement('div'); medal.className='pod-medal'; medal.textContent=medals[ri]||'';
    const avWrap=document.createElement('div');
    avWrap.className='pod-avatar'; avWrap.style.borderColor=colors[ri]||'#888';
    const img=new Image();
    const idx=parseInt((p.avatar||'character1').replace(/\D/g,''))-1;
    img.onload=()=>{ img.style.cssText='width:100%;height:100%;object-fit:cover;'; avWrap.innerHTML=''; avWrap.appendChild(img); };
    img.onerror=()=>{ avWrap.textContent=FALLBACK[idx>=0?idx:0]; };
    img.src=`/avatars/${p.avatar||'character1.png'}`;
    avWrap.appendChild(img);
    const name=document.createElement('div'); name.className='pod-pname'; name.textContent=p.name;
    const sc=document.createElement('div'); sc.className='pod-pscore'; sc.style.color=colors[ri]||'#888'; sc.textContent=p.score;
    const base=document.createElement('div'); base.className='pod-base';
    base.style.cssText=`height:${heights[ri]||50}px;background:${colors[ri]||'#555'};`;
    base.textContent=ri+1;
    col.appendChild(medal); col.appendChild(avWrap); col.appendChild(name); col.appendChild(sc); col.appendChild(base);
    pod.appendChild(col);
  });
  document.getElementById('finalScreen').classList.add('show');
  spawnConfetti();
}

function spawnConfetti(){
  const colors=['#FFD700','#00D4FF','#FF6B6B','#76FF7A','#A29BFE','#FD79A8'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s;
      transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),6000);
  }
}
</script>
