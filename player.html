<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>100% Logique — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#FFD700; --blue:#020B2D; --blue-m:#061456; --cyan:#00D4FF;
  --ok:#00E676; --err:#FF1744; --white:#FFF;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Nunito',sans-serif; background:var(--blue); color:var(--white);
  min-height:100vh; overflow-x:hidden; }

.page { display:none; min-height:100vh; padding:20px 16px;
  flex-direction:column; align-items:center; justify-content:flex-start; gap:14px; }
.page.show { display:flex; }

/* ── JOIN PAGE ── */
.join-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,215,0,.2);
  border-radius:20px; padding:24px 20px; width:100%; max-width:400px; display:flex;
  flex-direction:column; gap:14px; }
.join-logo { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),#FFF8A0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
.join-sub { font-size:13px; color:rgba(255,255,255,.5); text-align:center; margin-top:-8px; }

.section-label { font-size:12px; font-weight:800; letter-spacing:1px;
  color:rgba(255,215,0,.7); text-transform:uppercase; }

/* Avatar grid */
.avatar-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.av-btn { background:rgba(255,255,255,.07); border:2px solid transparent;
  border-radius:12px; aspect-ratio:1; cursor:pointer; overflow:hidden;
  transition:all .2s; display:flex; align-items:center; justify-content:center;
  padding:0; position:relative; }
.av-btn:hover:not(:disabled) { border-color:rgba(255,215,0,.5); transform:scale(1.05); }
.av-btn.selected { border-color:var(--gold); background:rgba(255,215,0,.15);
  box-shadow:0 0 12px rgba(255,215,0,.4); }
.av-btn img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
.av-btn .av-emoji { font-size:28px; line-height:1; }
.av-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
.av-btn:disabled::after { content:'✓'; position:absolute; inset:0; display:flex;
  align-items:center; justify-content:center; font-size:22px;
  background:rgba(0,0,0,.5); border-radius:10px; }

/* Age group */
.age-group { display:flex; gap:8px; }
.age-btn { flex:1; background:rgba(255,255,255,.07); border:2px solid transparent;
  border-radius:12px; padding:10px 4px; cursor:pointer; text-align:center;
  transition:all .2s; color:var(--white); }
.age-btn:hover { border-color:rgba(0,212,255,.4); }
.age-btn.selected { border-color:var(--cyan); background:rgba(0,212,255,.15); }
.age-btn .age-icon { font-size:24px; display:block; margin-bottom:4px; }
.age-btn .age-label { font-size:11px; font-weight:800; display:block; }
.age-btn .age-hint { font-size:10px; color:rgba(255,255,255,.5); display:block; margin-top:2px; }

/* Name input */
.name-input { width:100%; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2);
  border-radius:12px; padding:14px 16px; color:var(--white); font-size:18px; font-weight:800;
  font-family:'Nunito',sans-serif; outline:none; text-align:center; }
.name-input:focus { border-color:var(--gold); }
.name-input::placeholder { color:rgba(255,255,255,.3); }

.btn-gold { background:linear-gradient(135deg,var(--gold),#B8860B);
  color:#000; border:none; border-radius:14px; padding:14px 28px;
  font-size:18px; font-weight:900; cursor:pointer; width:100%;
  transition:all .2s; font-family:'Nunito',sans-serif; }
.btn-gold:hover { transform:scale(1.02); filter:brightness(1.1); }
.btn-gold:disabled { opacity:.4; cursor:not-allowed; transform:none; }

#wsStatus { font-size:12px; text-align:center; color:rgba(255,255,255,.4); }

/* ── LOBBY PAGE ── */
.lobby-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,215,0,.2);
  border-radius:20px; padding:24px 20px; width:100%; max-width:400px;
  display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center; }
.my-avatar { width:80px; height:80px; border-radius:50%; border:3px solid var(--gold);
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.1); }
.my-avatar img { width:100%; height:100%; object-fit:cover; }
.my-avatar .av-emoji-lg { font-size:48px; }
.my-name { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); }
.lobby-waiting { font-size:15px; color:rgba(255,255,255,.6); }
.pulse-dots::after { content:''; animation:dots 1.5s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
.age-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:800;
  background:rgba(0,212,255,.2); border:1px solid rgba(0,212,255,.4); color:var(--cyan); }

/* ── QUESTION PAGE ── */
.q-header { width:100%; max-width:500px; display:flex; justify-content:space-between;
  align-items:center; }
.q-badge { background:rgba(255,215,0,.15); border:1px solid rgba(255,215,0,.3);
  border-radius:20px; padding:4px 12px; font-size:13px; font-weight:800; color:var(--gold); }
.q-score { font-size:13px; color:rgba(255,255,255,.6); font-weight:700; }
.timer-wrap { width:100%; max-width:500px; height:6px; background:rgba(255,255,255,.1);
  border-radius:3px; overflow:hidden; }
.timer-fill { height:100%; background:linear-gradient(90deg,var(--gold),#FF6B6B);
  border-radius:3px; transition:width 1s linear; width:100%; }
.q-text { font-size:clamp(18px,4vw,24px); font-weight:800; text-align:center;
  line-height:1.4; max-width:500px; width:100%; }
.hint-box { background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3);
  border-radius:12px; padding:10px 14px; width:100%; max-width:500px;
  display:flex; gap:8px; align-items:flex-start; }
.hint-icon { font-size:18px; flex-shrink:0; }
.hint-text { font-size:13px; color:rgba(255,255,255,.8); line-height:1.4; }
.answers-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px;
  width:100%; max-width:500px; }
.ans-btn { background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15);
  border-radius:14px; padding:14px 10px; cursor:pointer; text-align:center;
  font-size:clamp(14px,3vw,17px); font-weight:800; color:var(--white);
  transition:all .2s; display:flex; flex-direction:column; gap:4px; align-items:center; }
.ans-btn:hover { border-color:rgba(255,215,0,.5); background:rgba(255,215,0,.1); transform:scale(1.02); }
.ans-btn.selected { border-color:var(--cyan); background:rgba(0,212,255,.15); }
.ans-btn.correct { border-color:var(--ok); background:rgba(0,230,118,.2); }
.ans-btn.wrong { border-color:var(--err); background:rgba(255,23,68,.15); opacity:.7; }
.ans-btn:disabled { cursor:default; transform:none; }
.ans-letter { font-size:11px; color:rgba(255,255,255,.4); font-weight:700; }

.sent-banner { background:rgba(0,230,118,.15); border:1px solid rgba(0,230,118,.4);
  border-radius:12px; padding:10px 16px; width:100%; max-width:500px; text-align:center;
  font-weight:800; font-size:14px; color:var(--ok); }

/* ── REVEAL PAGE ── */
.reveal-result { font-size:clamp(32px,8vw,52px); }
.reveal-pts { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,6vw,42px);
  color:var(--gold); }
.reveal-correct-txt { font-size:14px; color:rgba(255,255,255,.6); }
.reveal-answer { font-size:clamp(18px,4vw,24px); font-weight:800; color:var(--ok);
  text-align:center; max-width:400px; }
.fact-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,215,0,.2);
  border-radius:16px; padding:16px; width:100%; max-width:500px; }
.fact-title { font-size:11px; font-weight:800; letter-spacing:1px; color:var(--gold);
  margin-bottom:6px; }
.fact-body { font-size:13px; color:rgba(255,255,255,.75); line-height:1.5; }
.waiting-next { font-size:13px; color:rgba(255,255,255,.4); text-align:center; }

/* ── FINAL PAGE ── */
.final-title { font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--gold);
  letter-spacing:3px; }
.final-score { font-family:'Bebas Neue',sans-serif; font-size:72px; color:var(--cyan); }
.final-rank { font-size:16px; color:rgba(255,255,255,.7); }
.scores-list { width:100%; max-width:400px; display:flex; flex-direction:column; gap:8px; }
.score-row { background:rgba(255,255,255,.07); border-radius:12px; padding:12px 14px;
  display:flex; align-items:center; gap:10px; }
.score-avatar { width:36px; height:36px; border-radius:50%; overflow:hidden;
  display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.1);
  flex-shrink:0; font-size:20px; }
.score-avatar img { width:100%; height:100%; object-fit:cover; }
.score-name { flex:1; font-weight:800; font-size:15px; }
.score-pts { font-family:'Bebas Neue',sans-serif; font-size:22px; }
</style>
</head>
<body>

<!-- ══ JOIN PAGE ══ -->
<div class="page show" id="joinPage">
  <div class="join-card">
    <div class="join-logo">100% Logique</div>
    <div class="join-sub">Family Quiz Game</div>

    <div>
      <div class="section-label">Choose your character</div>
      <div class="avatar-grid" id="avatarGrid"></div>
    </div>

    <div>
      <div class="section-label">Who are you?</div>
      <div class="age-group">
        <button class="age-btn" data-age="teen" onclick="selectAge(this)">
          <span class="age-icon">🧒</span>
          <span class="age-label">Teen</span>
          <span class="age-hint">Gets easy hints</span>
        </button>
        <button class="age-btn" data-age="young" onclick="selectAge(this)">
          <span class="age-icon">🧑</span>
          <span class="age-label">Young Adult</span>
          <span class="age-hint">Gets medium hints</span>
        </button>
        <button class="age-btn" data-age="adult" onclick="selectAge(this)">
          <span class="age-icon">🧓</span>
          <span class="age-label">Adult</span>
          <span class="age-hint">No hints — brave!</span>
        </button>
      </div>
    </div>

    <div>
      <div class="section-label">Your name</div>
      <input class="name-input" id="nameInput" placeholder="Enter your name" maxlength="16" autocomplete="off">
    </div>

    <div id="wsStatus">⏳ Connecting to game…</div>
    <button class="btn-gold" id="joinBtn" onclick="joinGame()" disabled>Join Game 🎮</button>
  </div>
</div>

<!-- ══ LOBBY PAGE ══ -->
<div class="page" id="lobbyPage">
  <div class="lobby-card">
    <div class="my-avatar" id="myAvatarLobby"></div>
    <div class="my-name" id="myNameTxt">Player</div>
    <div class="age-badge" id="myAgeBadge">Adult</div>
    <div class="lobby-waiting">Waiting for the host to start<span class="pulse-dots"></span></div>
    <div style="font-size:13px;color:rgba(255,255,255,.4)">Get ready! 🎯</div>
  </div>
</div>

<!-- ══ QUESTION PAGE ══ -->
<div class="page" id="questionPage">
  <div class="q-header">
    <div class="q-badge" id="qBadge">Q 1</div>
    <div class="q-score">Score: <span id="myScoreTxt">0</span></div>
  </div>
  <div class="timer-wrap"><div class="timer-fill" id="qTimerFill"></div></div>
  <div class="q-text" id="qText">Question text</div>
  <div class="hint-box" id="hintBox" style="display:none">
    <span class="hint-icon">💡</span>
    <span class="hint-text" id="hintText"></span>
  </div>
  <div class="answers-grid" id="answersGrid"></div>
  <div class="sent-banner" id="sentBanner" style="display:none">✅ Answer sent!</div>
</div>

<!-- ══ REVEAL PAGE ══ -->
<div class="page" id="revealPage">
  <div class="reveal-result" id="revealEmoji">✅</div>
  <div class="reveal-pts" id="revealPts">+100 pts</div>
  <div class="reveal-correct-txt">Correct answer:</div>
  <div class="reveal-answer" id="revealAnswer"></div>
  <div class="fact-card">
    <div class="fact-title">💡 DID YOU KNOW?</div>
    <div class="fact-body" id="revealFact"></div>
  </div>
  <div class="waiting-next">Waiting for host to continue…</div>
</div>

<!-- ══ FINAL PAGE ══ -->
<div class="page" id="finalPage">
  <div class="final-title">🏆 Final Results</div>
  <div class="final-score" id="myFinalScore">0</div>
  <div class="final-rank" id="myFinalRank"></div>
  <div class="scores-list" id="scoresList"></div>
</div>

<script>
/* ── AVATAR SETUP ───────────────────────────────────────── */
const AVATARS = ['Amelia.png','Cleopatra.png','Einstein.png','Joan of Arc.png','MLK.png','Shakespear.png'];
const FALLBACK_EMOJIS = ['🦊','🐺','🐸','🦁','🐯','🐻'];
let selectedAvatar = AVATARS[0];
let selectedAge    = 'adult';

function updateAvatarAvailability(takenAvatars) {
  document.querySelectorAll('.av-btn').forEach((btn, i) => {
    const av = AVATARS[i];
    const isTaken = takenAvatars.includes(av);
    btn.disabled = isTaken;
    if (isTaken && selectedAvatar === av) {
      const firstFree = AVATARS.findIndex(a => !takenAvatars.includes(a));
      if (firstFree >= 0) {
        selectedAvatar = AVATARS[firstFree];
        document.querySelectorAll('.av-btn').forEach((b, j) => b.classList.toggle('selected', j === firstFree));
      }
    }
  });
}

function buildAvatarGrid() {
  const grid = document.getElementById('avatarGrid');
  AVATARS.forEach((av, i) => {
    const btn = document.createElement('button');
    btn.className = 'av-btn' + (i===0?' selected':'');
    btn.onclick = () => {
      document.querySelectorAll('.av-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAvatar = av;
    };
    const img = new Image();
    img.onload = () => { btn.innerHTML=''; btn.appendChild(img); };
    img.onerror = () => { btn.innerHTML=`<span class="av-emoji">${FALLBACK_EMOJIS[i]}</span>`; };
    img.src = `/avatars/${av}`;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:10px';
    btn.appendChild(img);
    grid.appendChild(btn);
  });
}
buildAvatarGrid();

function selectAge(btn) {
  document.querySelectorAll('.age-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedAge = btn.dataset.age;
}
// Default selection
document.querySelector('[data-age="adult"]').classList.add('selected');

/* ── WEBSOCKET ───────────────────────────────────────────── */
const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${wsProto}://${location.host}`);

let myId             = null;
let myColor          = '#FFD700';
let myAvatar         = AVATARS[0];
let myScore          = 0;
let myLastAnswer     = null;
let myAnswerPosition = null; // 1-based position of my answer submission
let curCorrect       = null;
let pendingJoin      = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  window.scrollTo(0,0);
}
function send(obj) { if(ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

function renderAvatar(container, avatarFile, size=36) {
  container.innerHTML = '';
  const img = new Image();
  const idx = AVATARS.indexOf(avatarFile);
  img.onload = () => { container.appendChild(img); };
  img.onerror = () => { container.textContent = FALLBACK_EMOJIS[idx>=0?idx:0]; };
  img.src = `/avatars/${avatarFile}`;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  container.appendChild(img);
}

ws.onopen = () => {
  document.getElementById('wsStatus').style.color = '#00E676';
  document.getElementById('wsStatus').textContent = '✅ Connected!';
  document.getElementById('joinBtn').disabled = false;
  if (pendingJoin) { send(pendingJoin); pendingJoin = null; }
};
ws.onerror = () => {
  document.getElementById('wsStatus').style.color = '#FF1744';
  document.getElementById('wsStatus').textContent = '❌ Cannot connect — check WiFi';
};
ws.onclose = () => {
  if (!myId) {
    document.getElementById('wsStatus').style.color = '#FF1744';
    document.getElementById('wsStatus').textContent = '❌ Disconnected — refresh page';
  }
};

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  switch(msg.type) {
    case 'join-ack':
      myId = msg.id; myColor = msg.color; myAvatar = msg.avatar;
      const avatarEl = document.getElementById('myAvatarLobby');
      renderAvatar(avatarEl, myAvatar);
      document.getElementById('myNameTxt').textContent = msg.name;
      const ageLabels = {teen:'🧒 Teen (hints on!)', young:'🧑 Young Adult (hints on!)', adult:'🧓 Adult (no hints)'};
      document.getElementById('myAgeBadge').textContent = ageLabels[msg.ageGroup] || 'Adult';
      showPage('lobbyPage');
      break;
    case 'avatar-info':
      updateAvatarAvailability(msg.takenAvatars || []);
      break;
    case 'lobby':
      if (msg.takenAvatars) updateAvatarAvailability(msg.takenAvatars);
      if (myId) showPage('lobbyPage');
      break;
    case 'question':
      showQuestion(msg);
      break;
    case 'reveal':
      showReveal(msg);
      break;
    case 'finished':
      showFinal(msg.scores);
      break;
    case 'answer-ack':
      myLastAnswer = msg.answerIndex;
      myAnswerPosition = msg.position;
      document.getElementById('sentBanner').style.display = 'block';
      break;
  }
};

/* ── JOIN ───────────────────────────────────────── */
function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  document.getElementById('joinBtn').textContent = 'Joining…';
  document.getElementById('joinBtn').disabled = true;
  const payload = { type:'player-join', name, avatar:selectedAvatar, ageGroup:selectedAge };
  if (ws.readyState === WebSocket.OPEN) send(payload);
  else pendingJoin = payload;
}
document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });

/* ── QUESTION ───────────────────────────────────── */
function showQuestion(msg) {
  myLastAnswer = null; myAnswerPosition = null; curCorrect = null;
  document.getElementById('qBadge').textContent = `Q ${msg.index+1} / ${msg.total}`;
  document.getElementById('myScoreTxt').textContent = myScore;
  document.getElementById('qText').textContent = msg.q;
  document.getElementById('sentBanner').style.display = 'none';

  // Hint
  const hintBox  = document.getElementById('hintBox');
  const hintText = document.getElementById('hintText');
  if (msg.hint) {
    hintText.textContent = msg.hint;
    hintBox.style.display = 'flex';
  } else {
    hintBox.style.display = 'none';
  }

  // Timer
  const fill = document.getElementById('qTimerFill');
  fill.style.transition = 'none'; fill.style.width = '100%';
  setTimeout(() => {
    fill.style.transition = `width ${msg.timeLimit}s linear`;
    fill.style.width = '0%';
  }, 100);

  // Answers
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];
  msg.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<span class="ans-letter">${letters[i]}</span>${ans}`;
    btn.onclick = () => submitAnswer(i, msg.answers);
    grid.appendChild(btn);
  });

  showPage('questionPage');
}

function submitAnswer(idx, answers) {
  if (myLastAnswer !== null) return;
  myLastAnswer = idx;
  send({ type:'player-answer', answerIndex:idx });
  // Visual feedback immediately
  document.querySelectorAll('.ans-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i===idx) btn.classList.add('selected');
  });
  document.getElementById('sentBanner').style.display = 'block';
}

/* ── REVEAL ─────────────────────────────────────── */
function showReveal(msg) {
  curCorrect = msg.correctIndex;
  const wasCorrect = myLastAnswer === msg.correctIndex;
  // Use server-authoritative score
  const me = msg.scores && msg.scores.find(p => p.id === myId);
  if (me) myScore = me.score;

  const pts = wasCorrect ? Math.max(10, 100 - (myAnswerPosition - 1) * 10) : 0;
  const posLabel = wasCorrect && myAnswerPosition
    ? (myAnswerPosition === 1 ? '⚡ 1st to answer!' : `#${myAnswerPosition} to answer`)
    : '';

  document.getElementById('revealEmoji').textContent = wasCorrect ? (myAnswerPosition === 1 ? '⚡' : '🎉') : '😬';
  document.getElementById('revealPts').textContent   = wasCorrect ? `+${pts} pts ${posLabel}` : '+0 pts';
  document.getElementById('revealAnswer').textContent = msg.correctText;
  document.getElementById('revealFact').textContent   = msg.fact;
  document.getElementById('myScoreTxt').textContent   = myScore;
  showPage('revealPage');
}

/* ── FINAL ──────────────────────────────────────── */
function showFinal(scores) {
  const sorted = [...scores].sort((a,b)=>b.score-a.score);
  const myRank = sorted.findIndex(p=>p.id===myId)+1;
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('myFinalScore').textContent = myScore + ' pts';
  document.getElementById('myFinalRank').textContent = myRank<=3 ? medals[myRank-1]+' Place '+myRank : 'Place '+myRank;

  const list = document.getElementById('scoresList');
  list.innerHTML = sorted.map((p,i) => `
    <div class="score-row" style="border-left:3px solid ${p.color}">
      <div class="score-avatar" id="final-av-${p.id}">
        <img src="/avatars/${p.avatar}" onerror="this.parentNode.textContent='👤'" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div class="score-name">${medals[i]||'  '} ${p.name}</div>
      <div class="score-pts" style="color:${p.color}">${p.score}</div>
    </div>`).join('');
  showPage('finalPage');
}
</script>
</body>
</html>
